services:
  frontend:
    image: ecommerce-frontend:v1
    container_name: frontend-container
    ports:
      - "3000:80"

  product-service:
    image: product-service:v1
    container_name: product-container
    ports:
      - "5000:5000"

  postgres:
    image: postgres:15
    container_name: ecommerce-db
    restart: always
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce123
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
